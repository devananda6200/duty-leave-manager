<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Duty-Leave Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container glass-panel">
        <div class="login-header">
            <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <h2>Welcome Back</h2>
            <p>Sign in to manage your duty-leaves</p>
        </div>
        
        <div class="role-toggle">
            <button class="toggle-btn active" id="btn-student-login">Student</button>
            <button class="toggle-btn" id="btn-admin-login">Admin/Teacher</button>
        </div>

        <form id="login-form">
            <div id="error-msg" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 15px; display: none; text-align: center; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.3);"></div>
            <div class="form-group">
                <label for="username">Username / Roll No.</label>
                <input type="text" id="username" placeholder="Enter your ID" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Sign In</button>
        </form>
        
        <div class="login-footer">
            <p style="margin-top: 15px;">No account yet? <br><a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Register here</a></p>
            <p style="margin-top: 15px; font-size: 0.85rem; color: var(--text-secondary);">Mock Credentials:<br>
            Student: <strong>student / student</strong><br>
            Admin: <strong>admin / admin</strong></p>
        </div>
    </div>
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="login.js"></script>
</body>
</html>
