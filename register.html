<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Duty-Leave Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container glass-panel">
        <div class="login-header">
            <div class="logo-icon"><i class="fa-solid fa-user-plus"></i></div>
            <h2>Create Account</h2>
            <p>Sign up to apply for or approve leaves</p>
        </div>
        
        <div class="role-toggle">
            <button class="toggle-btn active" id="btn-student-register">Student</button>
            <button class="toggle-btn" id="btn-admin-register">Admin/Teacher</button>
        </div>

        <form id="register-form">
            <div id="error-msg" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 15px; display: none; text-align: center; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.3);"></div>
            <div class="form-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" placeholder="e.g. your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min 6 chars, 1 upper, 1 num" required>
            </div>
            <button type="submit" class="btn-primary" id="btn-submit-register" style="width: 100%; justify-content: center;">Register</button>
        </form>
        
        <div class="login-footer">
            <p style="margin-top: 15px;">Already have an account? <br><a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Sign In here</a></p>
        </div>
    </div>
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="register.js"></script>
</body>
</html>
